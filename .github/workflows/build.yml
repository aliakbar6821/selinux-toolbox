# =============================================================================
# SELinux Toolbox — GitHub Actions CI/CD
# Builds ARM64 secilc + sepolicy-analyze from AOSP source,
# then builds the Android APK.
# =============================================================================
name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      aosp_tag:
        description: 'AOSP selinux tag (e.g. android-15.0.0_r1)'
        required: false
        default: 'android-15.0.0_r1'

env:
  # NDK version — must match what BinaryManager expects (ARM64 static)
  NDK_VERSION: r27c
  # AOSP selinux userspace tag to build from
  AOSP_SELINUX_TAG: ${{ github.event.inputs.aosp_tag || 'android-15.0.0_r1' }}
  # Cache keys
  NDK_CACHE_KEY: ndk-r27c-linux
  SEPOLICY_CACHE_KEY: sepolicy-tools-android-15.0.0_r1

jobs:
  # ===========================================================================
  # Job 1: Build ARM64 native binaries
  # Runs on ubuntu-latest (x86_64 host, cross-compiles to ARM64)
  # ===========================================================================
  build-native-binaries:
    name: Build ARM64 secilc + sepolicy-analyze
    runs-on: ubuntu-latest

    outputs:
      # Pass cache key to next job so it can restore the binaries
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Generate a cache key that includes the AOSP tag so changing the tag
      # invalidates the cache and forces a rebuild.
      # -----------------------------------------------------------------------
      - name: Generate cache key
        id: cache-key
        run: |
          KEY="sepolicy-tools-${{ env.AOSP_SELINUX_TAG }}-ndk-${{ env.NDK_VERSION }}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Cache key: $KEY"

      # -----------------------------------------------------------------------
      # Try to restore cached binaries first.
      # If cache hit → skip the entire build (saves ~5 minutes).
      # -----------------------------------------------------------------------
      - name: Restore cached binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/bin
          key: ${{ steps.cache-key.outputs.key }}

      # -----------------------------------------------------------------------
      # Install system dependencies (only needed if building)
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wget \
            unzip \
            git \
            file \
            flex \
            bison \
            build-essential \
            --no-install-recommends

      # -----------------------------------------------------------------------
      # Cache the NDK download separately — it is 500MB and rarely changes
      # -----------------------------------------------------------------------
      - name: Restore cached NDK
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/android-ndk
          key: ${{ env.NDK_CACHE_KEY }}

      - name: Download Android NDK
        if: |
          steps.cache-binaries.outputs.cache-hit != 'true' &&
          steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          echo "Downloading NDK ${{ env.NDK_VERSION }}..."
          wget -q \
            "https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip" \
            -O /tmp/ndk.zip
          echo "Extracting NDK..."
          unzip -q /tmp/ndk.zip -d "$HOME/"
          mv "$HOME/android-ndk-${{ env.NDK_VERSION }}" "$HOME/android-ndk"
          rm -f /tmp/ndk.zip
          echo "NDK ready at $HOME/android-ndk"

      # -----------------------------------------------------------------------
      # Build the binaries using our script
      # -----------------------------------------------------------------------
      - name: Build secilc and sepolicy-analyze (ARM64)
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        env:
          NDK_DIR: ${{ github.workspace }}/../android-ndk
          OUTPUT_DIR: ${{ github.workspace }}/app/src/main/assets/bin
          BUILD_DIR: /tmp/sepolicy_build
          AOSP_SELINUX_TAG: ${{ env.AOSP_SELINUX_TAG }}
          NDK_VERSION: ${{ env.NDK_VERSION }}
        run: |
          # Use HOME-relative NDK path since env above uses workspace-relative
          export NDK_DIR="$HOME/android-ndk"
          chmod +x scripts/build_sepolicy_tools.sh
          bash scripts/build_sepolicy_tools.sh

      # -----------------------------------------------------------------------
      # Verify outputs exist and are ARM64
      # -----------------------------------------------------------------------
      - name: Verify binaries
        run: |
          echo "=== Binary verification ==="
          for binary in secilc sepolicy-analyze; do
            path="app/src/main/assets/bin/$binary"
            if [ ! -f "$path" ]; then
              echo "ERROR: $path not found!"
              exit 1
            fi
            info=$(file "$path")
            size=$(du -sh "$path" | cut -f1)
            echo "OK: $binary ($size)"
            echo "    $info"
            if ! echo "$info" | grep -qE "aarch64|ARM aarch64"; then
              echo "ERROR: $binary is not ARM64!"
              exit 1
            fi
          done
          echo "=== All binaries OK ==="

      # -----------------------------------------------------------------------
      # Upload binaries as artifact so the APK build job can use them
      # even if cache is not shared between jobs on the same run.
      # -----------------------------------------------------------------------
      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: sepolicy-binaries-arm64
          path: app/src/main/assets/bin/
          retention-days: 7
          if-no-files-found: error

  # ===========================================================================
  # Job 2: Build Android APK
  # Depends on Job 1 completing successfully.
  # ===========================================================================
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-native-binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Set up JDK 17 (required for AGP 8.x + Kotlin 1.9.x)
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # -----------------------------------------------------------------------
      # Download the binaries built in Job 1
      # -----------------------------------------------------------------------
      - name: Download sepolicy binaries
        uses: actions/download-artifact@v4
        with:
          name: sepolicy-binaries-arm64
          path: app/src/main/assets/bin/

      - name: Verify binaries downloaded
        run: |
          echo "Assets bin directory:"
          ls -la app/src/main/assets/bin/
          chmod +x app/src/main/assets/bin/secilc
          chmod +x app/src/main/assets/bin/sepolicy-analyze

      # -----------------------------------------------------------------------
      # Gradle cache — cache ~/.gradle to speed up dependency resolution
      # -----------------------------------------------------------------------
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-

      # -----------------------------------------------------------------------
      # Make gradlew executable (git does not always preserve +x)
      # -----------------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # -----------------------------------------------------------------------
      # Build debug APK
      # -----------------------------------------------------------------------
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # -----------------------------------------------------------------------
      # Build release APK (unsigned — sign separately for production)
      # -----------------------------------------------------------------------
      - name: Build Release APK (unsigned)
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # -----------------------------------------------------------------------
      # Upload APKs as artifacts
      # -----------------------------------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SELinuxToolbox-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SELinuxToolbox-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Print APK info for verification
      # -----------------------------------------------------------------------
      - name: Print APK sizes
        run: |
          echo "=== APK Sizes ==="
          find app/build/outputs/apk -name "*.apk" -exec du -sh {} \;

  # ===========================================================================
  # Job 3: Create GitHub Release (only on version tags)
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: SELinuxToolbox-debug

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: SELinuxToolbox-release-unsigned

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-debug.apk
            app-release-unsigned.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
